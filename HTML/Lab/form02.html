<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From 02</title>
</head>

<body>


    <form method="post">
        <h2>Registration</h2>
        <p>Please complete all fields below</p>
        <hr>

        <div class="ABC">
            <div class="EFG">
                <label for="fullNmae">Full Name</label>
                    <input type="text" id="fullNmae" name="fullNmae" required>
            </div>
            <div class="EFG">
                <label for="postalCode">Postal Code</label>
                    <input type="number" id="postalCode" name="postalCode" required>
            </div>
            <div class="EFG">
                <label for="dob">Date of Birth</label>
                    <input type="text" id="dob" name="dob" required>
            </div>
            <div class="EFG">
                <label for="eAddress">Email Address</label>
                    <input type="email" id="eAddress" name="eAddress" required>
            </div>
            <div class="EFG">
                <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" required>
            </div>
            <div class="EFG">
                <label for="country">Country</label>
                    <select id="country" name="country">
                            <option value=""> Select a country</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Nepal">Nepal</option>
                            <option value="Canada">Canada</option>
                        </select>

            </div>
            <div class="button">
                <button type="submit" class="buttonPrimary">Submit</button>
                <button type="reset" class="buttonSecondary">Reset</button>
                
            </div>
            
        </div>

    </form>

</body>

</html>

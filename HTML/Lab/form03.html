<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From 03</title>
</head>

<body>


    <form method="post">
        <h2>Create your account</h2>
        <p>Join us in a couple of steps</p>
        <hr>

        <div class="ABC">
            <div class="EFG">
                <label for="fullNmae">Full Name</label>
                    <input type="text" id="fullNmae" name="fullNmae" required>
            </div>
            <div class="EFG">
                <label for="age">Age</label>
                    <input type="number" id="age" name="age" required>
            </div>
            <div class="EFG">
                <label for="dob">Date of Birth</label>
                    <input type="text" id="dob" name="dob" required>
            </div>
            <div class="EFG">
                <label for="eAddress">Email Address</label>
                    <input type="email" id="eAddress" name="eAddress" required>
            </div>
            <div class="EFG">
                <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" required>
            </div>
            <div class="IJK">
                <label>Preferred contact</label>
                        <label><input type="radio" name="pc" value="email"> Email</label>
                        <label><input type="radio" name="pc" value="phone"> Phone</label>
                        <label><input type="radio" name="pc" value="sms"> SMS</label>
            </div>
            <div class="button">
                <button type="submit" class="buttonPrimary">Submit</button>
                <button type="reset" class="buttonSecondary">Reset</button>
                
            </div>
            
        </div>

    </form>

</body>

</html>
